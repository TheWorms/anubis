name: Sync fork avec upstream

on:
  schedule:
    - cron: '0 6 * * *'   # tous les jours à 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Synchroniser main depuis TecharoHQ/anubis
        run: gh repo sync TheWorms/anubis --branch main
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
